version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: modverse-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: modverse_ai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Next.js Application
  app:
    build: .
    container_name: modverse-app
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/modverse_ai
      NEXTAUTH_SECRET: development-secret-key
      NEXTAUTH_URL: http://localhost:3000
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      PERSPECTIVE_API_KEY: ${PERSPECTIVE_API_KEY}
      NODE_ENV: development
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev

volumes:
  postgres_data:
    driver: local
